---
layout: default
---

<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$','$'], ['\\(','\\)']],
      displayMath: [['$$','$$'], ['\\[','\\]']]
    },
    svg: { fontCache: 'global' }
  };
</script>
<script id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<article>
  <header class="mb-4">
    <h1 class="mb-2">{{ page.title }}</h1>
    <div class="text-muted">
      {{ page.date | date: "%B %d, %Y" }}
      {% if page.read_time %} · {{ page.read_time }} min read{% endif %}
      {% if page.tags %}
        · {% for t in page.tags %}<span class="badge text-bg-light me-1">{{ t }}</span>{% endfor %}
      {% endif %}
    </div>
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>
