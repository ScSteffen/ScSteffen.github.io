<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>

  <link rel="stylesheet" href="/stylesheet.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  {% seo %}
</head>
<body>
  <div class="container" style="max-width: 900px;">
    <header class="py-4">
      <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
        <div>
          <div class="h4 mb-0"><a class="site-title-link text-decoration-none" href="/">{{ site.title }}</a></div>
          <div class="text-muted" style="font-size: 0.95rem;">{{ site.description }}</div>
        </div>
        <nav class="d-flex gap-3">
          <a class="text-decoration-none" href="/">Home</a>
          <a class="text-decoration-none" href="/blog/">Blog</a>
          <a class="text-decoration-none" href="/#publications">Publications</a>
        </nav>
      </div>
      <hr class="mt-3" />
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="py-5 text-muted" style="font-size: 0.9rem;">
      <hr />
      <div>&copy; {{ "now" | date: "%Y" }} {{ site.title }}</div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
